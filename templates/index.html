<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chess AI</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=IBM+Plex+Mono:wght@400;500&display=swap');

  :root {
    --bg:       #0e0e0f;
    --surface:  #18181b;
    --border:   #2a2a2e;
    --gold:     #c9a84c;
    --gold-dim: #7a6430;
    --light-sq: #f0d9b5;
    --dark-sq:  #b58863;
    --text:     #e8e6e0;
    --muted:    #7a7870;
    --green:    #4caf50;
    --red:      #ef5350;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px 48px;
  }

  header { text-align: center; margin-bottom: 24px; }
  header h1 { font-family: 'Playfair Display', serif; font-size: 2rem; color: var(--gold); letter-spacing: 0.04em; }
  header p  { font-size: 0.7rem; color: var(--muted); margin-top: 4px; letter-spacing: 0.12em; text-transform: uppercase; }

  #status-bar { display:flex; align-items:center; gap:8px; font-size:0.7rem; color:var(--muted); margin-bottom:20px; letter-spacing:0.08em; }
  #model-dot  { width:8px; height:8px; border-radius:50%; background:var(--red); }
  #model-dot.loaded { background:var(--green); }

  .main { display:flex; gap:28px; align-items:flex-start; flex-wrap:wrap; justify-content:center; }

  .board-wrap { display:flex; flex-direction:column; align-items:center; gap:4px; }
  .board-row  { display:flex; align-items:center; gap:4px; }

  .rank-col { display:flex; flex-direction:column; justify-content:space-around; height:480px; width:18px; font-size:0.62rem; color:var(--muted); text-align:center; }
  .file-row { display:flex; justify-content:space-around; width:480px; font-size:0.62rem; color:var(--muted); padding:0 0 0 22px; }

  #board { width:480px; height:480px; display:grid; grid-template-columns:repeat(8,60px); grid-template-rows:repeat(8,60px); border:2px solid var(--gold-dim); box-shadow:0 0 48px #0009; position:relative; flex-shrink:0; }

  .sq { width:60px; height:60px; position:relative; cursor:pointer; display:flex; align-items:center; justify-content:center; overflow:hidden; }
  .sq.light { background:var(--light-sq); }
  .sq.dark  { background:var(--dark-sq); }
  .sq.selected::before  { content:''; position:absolute; inset:0; background:#f6f66988; pointer-events:none; z-index:1; }
  .sq.ai-from::before   { content:''; position:absolute; inset:0; background:#aee38566; pointer-events:none; z-index:1; }
  .sq.ai-to::before     { content:''; position:absolute; inset:0; background:#6abf4666; pointer-events:none; z-index:1; }
  .sq.legal-dot::after  { content:''; position:absolute; width:32%; height:32%; border-radius:50%; background:rgba(0,0,0,0.22); pointer-events:none; z-index:2; }
  .sq.legal-ring::after { content:''; position:absolute; inset:0; box-shadow:inset 0 0 0 5px rgba(0,0,0,0.25); pointer-events:none; z-index:2; }
  .sq svg { width:52px; height:52px; position:relative; z-index:3; pointer-events:none; }

  .panel { width:300px; display:flex; flex-direction:column; gap:14px; }
  .card  { background:var(--surface); border:1px solid var(--border); border-radius:6px; padding:14px; }
  .card h3 { font-family:'Playfair Display',serif; font-size:0.8rem; color:var(--gold); letter-spacing:0.1em; margin-bottom:10px; text-transform:uppercase; }

  .btn { display:block; width:100%; padding:10px; background:transparent; border:1px solid var(--gold-dim); color:var(--gold); font-family:'IBM Plex Mono',monospace; font-size:0.75rem; letter-spacing:0.08em; cursor:pointer; border-radius:4px; transition:background 0.15s,border-color 0.15s; text-transform:uppercase; }
  .btn:hover { background:#c9a84c18; border-color:var(--gold); }
  .btn-row { display:flex; gap:8px; }
  .btn-row .btn { font-size:0.68rem; }

  #turn-indicator { display:flex; align-items:center; gap:8px; font-size:0.75rem; color:var(--muted); }
  #turn-pip { width:14px; height:14px; border-radius:50%; border:2px solid #888; background:white; }
  #turn-pip.black { background:#1a1a1a; border-color:#555; }

  #ai-status { font-size:0.75rem; color:var(--muted); min-height:20px; display:flex; align-items:center; gap:8px; }
  #ai-status .move-san { color:var(--gold); font-size:1rem; font-weight:600; font-family:'Playfair Display',serif; }

  .spinner { width:14px; height:14px; border:2px solid var(--gold-dim); border-top-color:var(--gold); border-radius:50%; animation:spin 0.7s linear infinite; flex-shrink:0; }
  @keyframes spin { to { transform:rotate(360deg); } }

  /* ── Top 5 ── */
  #top5-list { font-size: 0.67rem; display: flex; flex-direction: column; gap: 6px; }

  .t5-row { display: flex; flex-direction: column; gap: 3px; }

  .t5-main {
    display: grid;
    grid-template-columns: 16px 42px 1fr auto;
    gap: 6px;
    align-items: baseline;
  }
  .t5-rank  { color: var(--gold-dim); font-size: 0.6rem; }
  .t5-san   { color: var(--text); font-weight: 600; letter-spacing: 0.03em; }
  .t5-uci   { color: var(--muted); font-size: 0.58rem; }
  .t5-score { font-family: 'IBM Plex Mono', monospace; font-size: 0.62rem; color: var(--muted); text-align: right; white-space: nowrap; }

  .t5-row.rank1 .t5-san   { color: var(--gold); }
  .t5-row.rank1 .t5-score { color: var(--gold); }
  .t5-row.rank1 .t5-rank  { color: var(--gold); }

  .t5-bar-track { height: 2px; background: var(--border); border-radius: 2px; }
  .t5-bar-fill  { height: 100%; border-radius: 2px; background: var(--gold-dim); transition: width 0.3s ease; }
  .t5-row.rank1 .t5-bar-fill { background: var(--gold); }

  .t5-divider { border: none; border-top: 1px solid var(--border); margin: 2px 0; }

  #top5-placeholder { color: var(--muted); font-size: 0.68rem; }

  /* move log */
  #move-log { max-height: 140px; overflow-y: auto; font-size: 0.7rem; color: var(--muted); line-height: 2; }
  #move-log .row { display: flex; gap: 6px; }
  #move-log .num { color: var(--gold-dim); min-width: 22px; }
  #move-log .wmv { color: var(--text); min-width: 52px; }
  #move-log .bmv { color: var(--muted); }

  #fen-box { width:100%; background:#111; border:1px solid var(--border); border-radius:4px; color:var(--muted); font-family:'IBM Plex Mono',monospace; font-size:0.58rem; padding:6px 8px; resize:none; height:48px; }

  #game-over { display:none; background:#c9a84c20; border:1px solid var(--gold-dim); border-radius:4px; padding:12px; text-align:center; font-family:'Playfair Display',serif; font-size:1rem; color:var(--gold); }

  .side-badge { display:flex; align-items:center; gap:6px; font-size:0.65rem; color:var(--muted); letter-spacing:0.08em; text-transform:uppercase; padding:2px 0; }
  .side-badge .pip { width:10px; height:10px; border-radius:50%; border:1.5px solid #888; }
  .side-badge .pip.w { background:white; }
  .side-badge .pip.b { background:#1a1a1a; border-color:#555; }
</style>
</head>
<body>

<header>
  <h1>♛ Chess AI</h1>
  <p>You play White · AI plays Black</p>
</header>

<div id="status-bar">
  <div id="model-dot"></div>
  <span id="model-status">Checking model…</span>
</div>

<div class="main">
  <div class="board-wrap">
    <div class="side-badge" style="align-self:flex-start;padding-left:22px"><div class="pip b"></div> Black (AI)</div>
    <div class="board-row">
      <div class="rank-col" id="rank-labels"></div>
      <div id="board"></div>
    </div>
    <div class="file-row" id="file-labels"></div>
    <div class="side-badge" style="align-self:flex-start;padding-left:22px"><div class="pip w"></div> White (You)</div>
  </div>

  <div class="panel">
    <div class="card">
      <h3>Turn</h3>
      <div id="turn-indicator"><div id="turn-pip"></div><span id="turn-text">Your move (White)</span></div>
    </div>

    <div id="game-over"></div>

    <div class="card">
      <h3>AI Last Move</h3>
      <div id="ai-status">Waiting for your move…</div>
    </div>

    <div class="card">
      <h3>Top 5 Moves</h3>
      <div id="top5-list"><span id="top5-placeholder">Waiting for AI turn…</span></div>
    </div>

    <div class="card">
      <h3>Controls</h3>
      <div class="btn-row">
        <button class="btn" onclick="undoMove()">← Undo</button>
        <button class="btn" onclick="resetBoard()">Reset</button>
      </div>
    </div>

    <div class="card">
      <h3>Move Log</h3>
      <div id="move-log"></div>
    </div>

    <div class="card">
      <h3>FEN</h3>
      <textarea id="fen-box" spellcheck="false" readonly></textarea>
    </div>
  </div>
</div>

const FILES = ['a','b','c','d','e','f','g','h'];
const RANKS = ['8','7','6','5','4','3','2','1'];
const START_FEN = 'rnbqkbnr/pppppppp/8/8/8/8/PPPPPPPP/RNBQKBNR w KQkq - 0 1';
const PLAYER = 'w';

let boardState={}, turn='w', selected=null, legalMoves=[];
let moveHistory=[], fenHistory=[], currentFen=START_FEN;
let gameOver=false, aiThinking=false;

function parseFEN(fen) {
  const parts=fen.split(' '), rows=parts[0].split('/'), b={};
  rows.forEach((row,ri)=>{
    let fi=0;
    for(const ch of row){ if(/\d/.test(ch)) fi+=+ch; else{ b[FILES[fi]+RANKS[ri]]=ch; fi++; } }
  });
  return { board:b, turn:parts[1]||'w' };
}

function renderBoard() {
  const el=document.getElementById('board'); el.innerHTML='';
  document.getElementById('rank-labels').innerHTML=RANKS.map(r=>`<span>${r}</span>`).join('');
  document.getElementById('file-labels').innerHTML=FILES.map(f=>`<span>${f}</span>`).join('');
  RANKS.forEach(rank=>{ FILES.forEach(file=>{
    const sq=file+rank, fi=FILES.indexOf(file), ri=RANKS.indexOf(rank);
    const div=document.createElement('div');
    div.className='sq '+((fi+ri)%2===1?'dark':'light');
    div.dataset.sq=sq;
    const piece=boardState[sq];
    if(piece&&PIECE_SVG[piece]) div.innerHTML=PIECE_SVG[piece];
    if(sq===selected) div.classList.add('selected');
    if(selected){ const lm=legalMoves.find(m=>m.from_sq===selected&&m.to_sq===sq); if(lm) div.classList.add(piece?'legal-ring':'legal-dot'); }
    div.addEventListener('click',()=>handleClick(sq));
    el.appendChild(div);
  });});
}

// ── Top 5 renderer ────────────────────────────────────────────────────────────
function renderTop5(top5) {
  const el = document.getElementById('top5-list');
  if (!top5 || !top5.length) {
    el.innerHTML = '<span style="color:var(--muted);font-size:0.68rem">No data</span>';
    return;
  }

  // Score bar: scale relative to spread between best and worst of top5
  const scores  = top5.map(m => m.score);
  const maxScore = Math.max(...scores);
  const minScore = Math.min(...scores);
  const spread   = maxScore - minScore;

  // If ALL scores identical, show equal bars at 60%
  const barPct = (score) => spread === 0
    ? 60
    : Math.max(8, Math.round(((score - minScore) / spread) * 92) + 8);

  // Format score: show 6 decimal places so tiny differences are visible
  const fmt = (s) => {
    if (Math.abs(s) >= 1000) return s.toFixed(1);
    if (Math.abs(s) >= 1)    return s.toFixed(4);
    return s.toFixed(6);
  };

  el.innerHTML = top5.map((m, i) => `
    <div class="t5-row${m.rank === 1 ? ' rank1' : ''}">
      <div class="t5-main">
        <span class="t5-rank">${m.rank}</span>
        <span class="t5-san">${m.san}</span>
        <span class="t5-uci">${m.uci}</span>
        <span class="t5-score">${fmt(m.score)}</span>
      </div>
      <div class="t5-bar-track">
        <div class="t5-bar-fill" style="width:${barPct(m.score)}%"></div>
      </div>
    </div>
    ${i < top5.length - 1 ? '<hr class="t5-divider">' : ''}
  `).join('');
}

function renderUI() {
  const pip=document.getElementById('turn-pip'), txt=document.getElementById('turn-text');
  pip.className=turn==='b'?'black':'';
  txt.textContent=gameOver?'Game over':aiThinking?'AI is thinking…':turn===PLAYER?'Your move (White)':'AI thinking…';
  const logEl=document.getElementById('move-log'); let html='';
  for(let i=0;i<moveHistory.length;i+=2){
    const num=Math.floor(i/2)+1, w=moveHistory[i]?.san||'', b=moveHistory[i+1]?.san||'';
    html+=`<div class="row"><span class="num">${num}.</span><span class="wmv">${w}</span><span class="bmv">${b}</span></div>`;
  }
  logEl.innerHTML=html; logEl.scrollTop=logEl.scrollHeight;
  document.getElementById('fen-box').value=currentFen;
}

function setAIStatus(html){ document.getElementById('ai-status').innerHTML=html; }

async function handleClick(sq) {
  if(gameOver||aiThinking||turn!==PLAYER) return;
  if(selected){
    const move=legalMoves.find(m=>m.from_sq===selected&&m.to_sq===sq);
    if(move){ await playerMove(move.uci); return; }
    if(sq===selected){ selected=null; legalMoves=[]; renderBoard(); return; }
  }
  const piece=boardState[sq];
  if(!piece){ selected=null; legalMoves=[]; renderBoard(); return; }
  if(piece!==piece.toUpperCase()){ selected=null; legalMoves=[]; renderBoard(); return; }
  selected=sq;
  const resp=await fetch('/api/legal-moves',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({fen:currentFen})});
  const data=await resp.json();
  legalMoves=(data.legal_moves||[]).filter(m=>m.from_sq===sq);
  renderBoard();
}

async function playerMove(uci) {
  const resp=await fetch('/api/apply-move',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({fen:currentFen,uci})});
  const data=await resp.json();
  if(data.error){ console.error(data.error); return; }
  fenHistory.push(currentFen); moveHistory.push({san:data.san,color:'w'});
  currentFen=data.new_fen;
  const parsed=parseFEN(currentFen); boardState=parsed.board; turn=parsed.turn;
  selected=null; legalMoves=[];
  renderBoard(); renderUI();
  if(data.is_game_over){ showGameOver(data.result); return; }
  await aiMove();
}

async function aiMove() {
  aiThinking=true;
  setAIStatus('<span class="spinner"></span> Thinking…');
  renderUI();

  const resp=await fetch('/api/best-move',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({fen:currentFen})});
  const data=await resp.json();

  if(data.error||data.is_game_over){
    aiThinking=false;
    if(data.is_game_over) showGameOver(data.result);
    return;
  }

  // ── Show top5 as soon as scores are back ──
  if(data.top5 && data.top5.length) renderTop5(data.top5);

  await new Promise(r=>setTimeout(r,300));

  const applyResp=await fetch('/api/apply-move',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({fen:currentFen,uci:data.uci})});
  const applyData=await applyResp.json();
  aiThinking=false;

  if(applyData.error){ console.error(applyData.error); return; }
  fenHistory.push(currentFen); moveHistory.push({san:applyData.san,color:'b'});
  currentFen=applyData.new_fen;
  const parsed=parseFEN(currentFen); boardState=parsed.board; turn=parsed.turn;

  setAIStatus(`Played <span class="move-san">${applyData.san}</span>`);
  renderBoard(); renderUI();

  setTimeout(()=>{
    document.querySelector(`[data-sq="${data.from_sq}"]`)?.classList.add('ai-from');
    document.querySelector(`[data-sq="${data.to_sq}"]`)?.classList.add('ai-to');
  },0);

  if(applyData.is_game_over) showGameOver(applyData.result);
}

function undoMove() {
  if(!fenHistory.length) return;
  const steps=Math.min(2,fenHistory.length);
  for(let i=0;i<steps;i++){ fenHistory.pop(); moveHistory.pop(); }
  currentFen=fenHistory.length?fenHistory[fenHistory.length-1]:START_FEN;
  gameOver=false; aiThinking=false;
  document.getElementById('game-over').style.display='none';
  setAIStatus('Waiting for your move…');
  document.getElementById('top5-list').innerHTML='<span style="color:var(--muted);font-size:0.68rem">Waiting for AI turn…</span>';
  const parsed=parseFEN(currentFen); boardState=parsed.board; turn=parsed.turn;
  selected=null; legalMoves=[]; renderBoard(); renderUI();
}

function resetBoard() {
  currentFen=START_FEN; fenHistory=[]; moveHistory=[];
  gameOver=false; aiThinking=false;
  document.getElementById('game-over').style.display='none';
  setAIStatus('Waiting for your move…');
  document.getElementById('top5-list').innerHTML='<span style="color:var(--muted);font-size:0.68rem">Waiting for AI turn…</span>';
  const parsed=parseFEN(currentFen); boardState=parsed.board; turn=parsed.turn;
  selected=null; legalMoves=[]; renderBoard(); renderUI();
}

function showGameOver(result) {
  gameOver=true;
  const labels={'1-0':'White wins! 🎉','0-1':'Black wins!','1/2-1/2':'Draw!'};
  const el=document.getElementById('game-over');
  el.textContent=labels[result]||'Game over: '+result;
  el.style.display='block'; renderUI();
}

async function checkStatus() {
  try{
    const r=await fetch('/api/status'), d=await r.json();
    const dot=document.getElementById('model-dot'), span=document.getElementById('model-status');
    if(d.model_loaded){ dot.classList.add('loaded'); span.textContent='LGBMRanker loaded ✓'; }
    else span.textContent=`No model at "${d.model_path}" — using fallback`;
  }catch(e){}
}

resetBoard();
checkStatus();
</script>
